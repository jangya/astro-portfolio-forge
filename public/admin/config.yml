backend:
  name: github
  repo: jangya/astro-portfolio-forge
  branch: main
  # Replace this with your deployed Decap/GitHub OAuth proxy before using
  # production CMS login on GitHub Pages.
  base_url: https://your-auth-provider.example.com

local_backend: true

site_url: https://jangya.github.io/astro-portfolio-forge
display_url: https://jangya.github.io/astro-portfolio-forge
logo_url: /astro-portfolio-forge/favicon/favicon.svg

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Insights
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: publishDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string }, default: [] }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
