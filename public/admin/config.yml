backend:
  name: proxy
  proxy_url: http://127.0.0.1:8081/api/v1
  branch: main

# Production GitHub Pages CMS login needs a real OAuth proxy.
# Replace the local proxy backend above with this block after you deploy one:
#
# backend:
#   name: github
#   repo: jangya/astro-portfolio-forge
#   branch: main
#   base_url: https://your-decap-oauth-provider.example.com

site_url: https://jangya.github.io/astro-portfolio-forge
display_url: https://jangya.github.io/astro-portfolio-forge
logo_url: /astro-portfolio-forge/favicon/favicon.svg

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: Insights
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Publish Date, name: publishDate, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string }, default: [] }
      - { label: Hero Image, name: heroImage, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
